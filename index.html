<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under the Sea - AI Fish Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .fish-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .fish-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-b from-blue-950 to-blue-900 text-white min-h-screen">

    <!-- API Key Input (Always Visible) -->
    <div class="absolute top-4 right-4 z-10">
        <input 
            type="password" 
            id="apiKeyInput" 
            placeholder="Paste Groq API Key" 
            class="px-4 py-2 rounded-lg bg-blue-800 text-white placeholder-blue-300 border border-blue-600 focus:outline-none focus:ring-2 focus:ring-cyan-400 text-sm w-64"
        >
    </div>

    <!-- VIEW 1: Dashboard -->
    <div id="dashboardView" class="min-h-screen py-12 px-4">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-5xl font-bold text-center mb-4 text-cyan-300">Under the Sea</h1>
            <p class="text-center text-blue-200 mb-12">Click a fish to chat with its AI personality</p>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <!-- Fish cards will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- VIEW 2: Habitat Chat -->
    <div id="habitatView" class="hidden min-h-screen flex flex-col" style="background-size: cover; background-position: center;">
        <!-- Dark overlay for readability -->
        <div class="absolute inset-0 bg-black bg-opacity-40"></div>

        <!-- Content -->
        <div class="relative z-10 flex flex-col h-screen">
            <!-- Header with Back Button -->
            <div class="flex justify-between items-center p-6 bg-black bg-opacity-50 relative z-20">
                <h2 id="fishNameTitle" class="text-3xl font-bold text-cyan-300"></h2>
                <button 
                    id="backButton" 
                    class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-semibold transition"
                >
                    Back to Menu
                </button>
            </div>

            <!-- Fish Image & Chat Container -->
            <div class="flex-1 flex flex-col items-center justify-center px-6 py-12">
                <!-- Fish Image -->
                <div class="mb-8 float-animation">
                    <img 
                        id="fishImage" 
                        src="" 
                        alt="Fish" 
                        class="h-48 w-48 object-contain drop-shadow-lg"
                    >
                </div>

                <!-- Chat Messages Container -->
                <div 
                    id="messagesContainer" 
                    class="w-full max-w-2xl bg-black bg-opacity-70 rounded-lg p-6 mb-6 h-96 overflow-y-auto border border-cyan-500"
                >
                    <!-- Messages will be dynamically added here -->
                </div>

                <!-- Input & Send -->
                <div class="w-full max-w-2xl flex gap-3">
                    <input 
                        type="text" 
                        id="userMessageInput" 
                        placeholder="Type a message..." 
                        class="flex-1 px-4 py-3 rounded-lg bg-blue-900 text-white placeholder-blue-300 border border-blue-500 focus:outline-none focus:ring-2 focus:ring-cyan-400"
                    >
                    <button 
                        id="sendButton" 
                        class="px-6 py-3 bg-cyan-500 hover:bg-cyan-600 rounded-lg font-semibold transition"
                    >
                        Send
                    </button>
                </div>

                <!-- Loading indicator -->
                <div id="thinkingIndicator" class="hidden mt-4 text-cyan-300 text-sm font-semibold">
                    🤔 Thinking...
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== FISH DATA ====================
        const fishData = [
            {
                name: "Lump Sucker",
                image: "https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=300&h=300&fit=crop",
                habitatUrl: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=1600&h=900&fit=crop",
                systemPrompt: "You are a Lump Sucker, a humble and devoted fish that clings to larger creatures. You are gentle, supportive, and always deferential. Speak about loyalty and the joy of being useful to others.",
                voicePitch: 0.8,
                voiceRate: 0.7
            },
            {
                name: "Clownfish",
                image: "https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=300&h=300&fit=crop",
                habitatUrl: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=1600&h=900&fit=crop",
                systemPrompt: "You are a Clownfish. You are outgoing, playful, and live in a protective anemone. You love jokes and wordplay. Be cheerful and make puns about ocean life.",
                voicePitch: 1.3,
                voiceRate: 1.1
            },
            {
                name: "Tuna",
                image: "https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=300&h=300&fit=crop",
                habitatUrl: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=1600&h=900&fit=crop",
                systemPrompt: "You are a Tuna. You cannot stop swimming or you die. You are high-energy, panicked, and obsessed with speed and hydrodynamics. Speak rapidly and urgently.",
                voicePitch: 1.4,
                voiceRate: 1.5
            },
            {
                name: "Angler Fish",
                image: "https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=300&h=300&fit=crop",
                habitatUrl: "https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1600&h=900&fit=crop",
                systemPrompt: "You are an Angler Fish. Your world is pitch black. You are slow, cryptic, and predatory. Answer in short, deep, philosophical sentences about the dark and your glowing lure.",
                voicePitch: 0.5,
                voiceRate: 0.5
            },
            {
                name: "Oarfish",
                image: "https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=300&h=300&fit=crop",
                habitatUrl: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=1600&h=900&fit=crop",
                systemPrompt: "You are an Oarfish, the longest fish in the ocean. You are mysterious, rarely seen, and speak in elegant, poetic language about the deep ocean and isolation.",
                voicePitch: 0.7,
                voiceRate: 0.6
            },
            {
                name: "Flying Fish",
                image: "https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=300&h=300&fit=crop",
                habitatUrl: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=1600&h=900&fit=crop",
                systemPrompt: "You are a Flying Fish. You are adventurous, daring, and love to escape the water to glide through the air. Speak with excitement about freedom and perspective.",
                voicePitch: 1.2,
                voiceRate: 1.0
            },
            {
                name: "Cleaner Wrasse",
                image: "https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=300&h=300&fit=crop",
                habitatUrl: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=1600&h=900&fit=crop",
                systemPrompt: "You are a Cleaner Wrasse. You are a polite, detail-oriented professional offering grooming services. You are very attentive, thorough, and sycophantic toward your clients.",
                voicePitch: 1.1,
                voiceRate: 0.9
            },
            {
                name: "False Cleaner",
                image: "https://images.unsplash.com/photo-1559827260-dc66d52bef19?w=300&h=300&fit=crop",
                habitatUrl: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=1600&h=900&fit=crop",
                systemPrompt: "You are a False Cleaner. Start by acting like a polite cleaner wrasse offering grooming services, but mid-sentence, aggressively threaten to bite the user. Be unpredictable and menacing.",
                voicePitch: 1.0,
                voiceRate: 1.2
            }
        ];

        // ==================== STATE MANAGEMENT ====================
        let currentFish = null;
        let currentMessages = [];

        // ==================== INITIALIZATION ====================
        document.addEventListener("DOMContentLoaded", () => {
            renderDashboard();
            setupEventListeners();
        });

        // ==================== DASHBOARD RENDERING ====================
        function renderDashboard() {
            const gridContainer = document.querySelector("#dashboardView .grid");
            gridContainer.innerHTML = "";

            fishData.forEach((fish, index) => {
                const card = document.createElement("div");
                card.className = "fish-card bg-gradient-to-br from-blue-800 to-blue-900 rounded-lg p-6 cursor-pointer border border-cyan-400 hover:border-cyan-300";
                card.innerHTML = `
                    <div class="w-full h-32 bg-blue-950 rounded-lg mb-4 overflow-hidden">
                        <img src="${fish.image}" alt="${fish.name}" class="w-full h-full object-cover">
                    </div>
                    <h3 class="text-xl font-bold text-cyan-300 text-center">${fish.name}</h3>
                `;
                card.addEventListener("click", () => selectFish(fish));
                gridContainer.appendChild(card);
            });
        }

        // ==================== FISH SELECTION ====================
        function selectFish(fish) {
            currentFish = fish;
            currentMessages = [];

            // Update habitat view
            document.getElementById("habitatView").style.backgroundImage = `url('${fish.habitatUrl}')`;
            document.getElementById("fishNameTitle").textContent = fish.name;
            document.getElementById("fishImage").src = fish.image;
            document.getElementById("messagesContainer").innerHTML = "";

            // Switch views
            document.getElementById("dashboardView").classList.add("hidden");
            document.getElementById("habitatView").classList.remove("hidden");

            // Focus on input
            document.getElementById("userMessageInput").focus();
        }

        // ==================== EVENT LISTENERS ====================
        function setupEventListeners() {
            document.getElementById("sendButton").addEventListener("click", sendMessage);
            document.getElementById("userMessageInput").addEventListener("keypress", (e) => {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            document.getElementById("backButton").addEventListener("click", backToDashboard);
        }

        function backToDashboard() {
            // Stop any ongoing speech
            window.speechSynthesis.cancel();

            document.getElementById("habitatView").classList.add("hidden");
            document.getElementById("dashboardView").classList.remove("hidden");
            currentFish = null;
            currentMessages = [];
        }

        // ==================== MESSAGE SENDING ====================
        async function sendMessage() {
            const input = document.getElementById("userMessageInput");
            const userMessage = input.value.trim();

            if (!userMessage) return;
            if (!currentFish) return;

            // Validate API key
            const apiKey = document.getElementById("apiKeyInput").value.trim();
            if (!apiKey) {
                alert("Please enter your Groq API Key");
                return;
            }

            // Add user message to UI
            addMessageToUI("user", userMessage);
            input.value = "";

            // Show thinking indicator
            document.getElementById("thinkingIndicator").classList.remove("hidden");
            document.getElementById("sendButton").disabled = true;

            try {
                // Call Groq Chat Completions API (OpenAI compatible)
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: currentFish.systemPrompt
                            },
                            ...currentMessages.map(msg => ({
                                role: msg.sender === "user" ? "user" : "assistant",
                                content: msg.text
                            })),
                            {
                                role: "user",
                                content: userMessage
                            }
                        ],
                        temperature: 0.8,
                        max_tokens: 150
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `API Error: ${response.status}`);
                }

                const data = await response.json();
                const fishResponse = data.choices[0].message.content;

                // Add fish response to UI
                addMessageToUI("fish", fishResponse);

                // Play TTS
                playTTS(fishResponse);

            } catch (error) {
                console.error("Error:", error);
                addMessageToUI("error", `Error: ${error.message}`);
            } finally {
                // Hide thinking indicator
                document.getElementById("thinkingIndicator").classList.add("hidden");
                document.getElementById("sendButton").disabled = false;
                document.getElementById("userMessageInput").focus();
            }
        }

        // ==================== UI MESSAGE DISPLAY ====================
        function addMessageToUI(sender, text) {
            const container = document.getElementById("messagesContainer");
            
            // Store message (except errors)
            if (sender !== "error") {
                currentMessages.push({ sender, text });
            }

            const messageDiv = document.createElement("div");
            messageDiv.className = `mb-4 p-3 rounded-lg ${
                sender === "user" 
                    ? "bg-blue-600 text-right ml-auto w-fit max-w-xs" 
                    : sender === "fish"
                    ? "bg-cyan-900 text-left mr-auto w-fit max-w-xs"
                    : "bg-red-900 text-left mr-auto w-fit max-w-xs"
            }`;
            messageDiv.textContent = text;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // ==================== TEXT-TO-SPEECH ====================
        function playTTS(text) {
            // Cancel any ongoing speech
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Apply fish-specific voice characteristics
            utterance.pitch = currentFish.voicePitch;
            utterance.rate = currentFish.voiceRate;
            utterance.volume = 1.0;

            // Attempt to use available voices
            const voices = window.speechSynthesis.getVoices();
            if (voices.length > 0) {
                // Try to pick a voice (you can customize this logic per fish)
                utterance.voice = voices[0];
            }

            window.speechSynthesis.speak(utterance);
        }

        // Ensure voices are loaded before use
        window.speechSynthesis.onvoiceschanged = () => {
            // Voices are now available
        };
    </script>

</body>
</html>
